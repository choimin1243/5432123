name: Build HWPX Merger EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 수동 실행 허용

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: PyInstaller로 EXE 빌드
        run: |
          pyinstaller --onefile --windowed --name "HWPX합치기" merge_hwpx.py

      - name: EXE 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: HWPX합치기-exe
          path: dist/HWPX합치기.exe
          retention-days: 30
